<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- ЪЪХфвЦЖЏЖЫ+ШЋфЏРРЦїМцШн -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЩуЯёЭЗзДЬЌМьВт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ШЋЦСШнЦїЃЌНЅБфБГОА+ЖЏЬЌаЇЙћ */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ьХВЪНЅБфБГОАЃЌздЖЏб­ЛЗСїЖЏ */
            background: linear-gradient(45deg, 
                #ff0080, #ff6600, #ffff00, #00ff00, #00ffff, #0066ff, #9900ff
            );
            background-size: 600% 600%;
            animation: gradientFlow 8s ease infinite;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            overflow: hidden;
        }

        /* БГОАНЅБфСїЖЏЖЏЛ­ */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* КЫаФЮФзжШнЦїЃКЗЂЙт+аќИЁ+ЫѕЗХ */
        .status-text {
            font-size: 6vw;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            /* ЖрВуЮФзжЗЂЙтЬиаЇ */
            text-shadow: 
                0 0 10px #fff,
                0 0 20px #ff00de,
                0 0 30px #00ffff,
                0 0 40px #ff6600,
                0 0 70px #ff00de,
                0 0 80px #00ffff,
                0 0 100px #ff6600;
            animation: 
                float 3s ease-in-out infinite,
                pulse 2s ease-in-out infinite,
                colorShift 5s linear infinite;
            z-index: 10;
            user-select: none;
        }

        /* ЮФзжаќИЁЩЯЯТИЁЖЏ */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* ЮФзжКєЮќЫѕЗХ */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* ЮФзжбеЩЋНЅБф */
        @keyframes colorShift {
            0% { color: #fff; }
            25% { color: #00ffff; }
            50% { color: #ff00de; }
            75% { color: #ff6600; }
            100% { color: #fff; }
        }

        /* ШЋЦСьХВЪСЃзгЕузК */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            pointer-events: none;
            animation: particleMove linear infinite;
        }
    </style>
</head>
<body>
    <!-- КЫаФабФПЮФзж -->
    <div class="status-text">ФњЕФЩуЯёЭЗЭъКУ</div>

    <script>
        // здЖЏЩњГЩьХВЪСЃзгЬиаЇ
        function createParticles() {
            const count = 50;
            const body = document.body;
            
            for(let i=0; i<count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // ЫцЛњДѓаЁЁЂЮЛжУЁЂЫйЖШ
                const size = Math.random() * 6 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.opacity = Math.random() * 0.8 + 0.2;
                particle.style.animationDuration = `${Math.random() * 10 + 5}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                body.appendChild(particle);
            }
        }

        // СЃзгдЫЖЏЖЏЛ­
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particleMove {
                0% { transform: translateY(0) rotate(0deg); opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // вГУцМгдиЭъГЩКѓЩњГЩСЃзг
        window.addEventListener('load', createParticles);
    </script>
</body>
</html>
